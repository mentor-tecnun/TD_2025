<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contenidos de tecnolog&iacute;as digitales</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap');

    :root {
      --bg: #0d0f14;
      --surface: #151820;
      --surface2: #1c2030;
      --border: #252a3a;
      --accent: #4f9cf9;
      --accent2: #7c6af7;
      --accent3: #f96b4f;
      --text: #e8eaf2;
      --text-muted: #7a8099;
      --header-bg: #111420;
      --row-hover: #1a1f30;
      --tag-video: rgba(79,156,249,0.12);
      --tag-video-border: rgba(79,156,249,0.35);
      --tag-doc: rgba(124,106,247,0.12);
      --tag-doc-border: rgba(124,106,247,0.35);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      font-size: 13px;
      min-height: 100vh;
    }

    /* ── Header ── */
    .page-header {
      background: var(--header-bg);
      border-bottom: 1px solid var(--border);
      padding: 28px 36px 20px;
      display: flex;
      align-items: flex-end;
      gap: 20px;
    }
    .page-header h1 {
      font-family: 'Syne', sans-serif;
      font-size: 26px;
      font-weight: 800;
      letter-spacing: -0.5px;
      color: var(--text);
    }
    .page-header h1 span { color: var(--accent); }
    .status-pill {
      font-size: 10px;
      font-weight: 500;
      padding: 3px 10px;
      border-radius: 20px;
      background: rgba(79,156,249,0.12);
      border: 1px solid rgba(79,156,249,0.3);
      color: var(--accent);
      letter-spacing: 0.5px;
      text-transform: uppercase;
      margin-bottom: 3px;
    }
    .status-pill.loading { color: #f9c74f; background: rgba(249,199,79,0.1); border-color: rgba(249,199,79,0.3); }
    .status-pill.error   { color: var(--accent3); background: rgba(249,107,79,0.1); border-color: rgba(249,107,79,0.3); }

    /* ── Source bar ── */
    .source-bar {
      display: none !important;
    }
    .source-bar {
      padding: 10px 36px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 11px;
      color: var(--text-muted);
    }
    .source-bar a { color: var(--accent); text-decoration: none; }
    .source-bar a:hover { text-decoration: underline; }

    /* ── Controls bar ── */
    .controls-bar {
      display: none !important;
    }
    .controls-bar {
      padding: 10px 36px;
      background: var(--surface2);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
    }
    .btn-toggle-preview {
      background: none;
      border: 1px solid var(--border);
      color: var(--accent);
      padding: 5px 14px;
      border-radius: 6px;
      cursor: pointer;
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      transition: all 0.2s;
    }
    .btn-toggle-preview:hover {
      background: rgba(79,156,249,0.1);
      border-color: var(--accent);
    }
    .btn-toggle-preview.active {
      background: rgba(79,156,249,0.15);
      border-color: var(--accent);
    }
    .controls-bar label { color: var(--text-muted); font-size: 11px; }
    select#iframeSize {
      background: var(--surface);
      color: var(--text);
      border: 1px solid var(--border);
      padding: 4px 8px;
      border-radius: 5px;
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      cursor: pointer;
    }

    /* ── Main content ── */
    .content { padding: 24px 36px 48px; }

    /* ── Section header ── */
    .section-title {
      font-family: 'Syne', sans-serif;
      font-size: 18px;
      font-weight: 700;
      color: var(--accent2);
      margin: 32px 0 12px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .section-title::before {
      content: '';
      display: inline-block;
      width: 4px;
      height: 20px;
      background: var(--accent2);
      border-radius: 2px;
    }

    /* ── Table ── */
    .topic-table {
      width: 100%;
      border-collapse: collapse;
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
      margin-bottom: 8px;
    }
    .topic-table thead tr {
      background: var(--surface2);
    }
    .topic-table thead th {
      font-family: 'Syne', sans-serif;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--text-muted);
      padding: 12px 16px;
      text-align: left;
      border-bottom: 1px solid var(--border);
    }
    .topic-table thead th:nth-child(1) { width: 18%; }
    .topic-table thead th:nth-child(2) { width: 18%; }
    .topic-table thead th:nth-child(3) { width: 42%; }
    .topic-table thead th:nth-child(4) { width: 22%; }

    .topic-table tbody tr {
      border-bottom: 1px solid var(--border);
      transition: background 0.15s;
    }
    .topic-table tbody tr:last-child { border-bottom: none; }
    .topic-table tbody tr:hover { background: var(--row-hover); }

    .topic-table td {
      padding: 14px 16px;
      vertical-align: top;
      line-height: 1.6;
    }
    .topic-table td:first-child {
      font-family: 'Syne', sans-serif;
      font-weight: 600;
      font-size: 13px;
      color: var(--text);
    }

    /* ── Links & items ── */
    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }

    .material-row {
      display: flex;
      align-items: flex-start;
      gap: 6px;
      margin-bottom: 6px;
      flex-wrap: wrap;
    }
    .material-row:last-child { margin-bottom: 0; }

    .tag {
      display: inline-block;
      font-size: 10px;
      padding: 1px 7px;
      border-radius: 4px;
      font-weight: 500;
      letter-spacing: 0.3px;
      white-space: nowrap;
      margin-top: 2px;
    }
    .tag-video, a[href*="unav.cloud.panopto.eu"] {
      background: var(--tag-video);
      border: 1px solid var(--tag-video-border);
      color: var(--accent);
    }
    .tag-doc {
      background: var(--tag-doc);
      border: 1px solid var(--tag-doc-border);
      color: var(--accent2);
    }

    .content-item {
      margin-bottom: 4px;
    }

    .practice-item {
      margin-bottom: 5px;
    }

    /* ── iFrame preview ── */
    .iframe-container {
      margin-top: 6px;
    }
    .iframe-container iframe {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: #fff;
      display: block;
    }

    /* ── Loading / Error ── */
    #loading-msg {
      padding: 40px 36px;
      color: var(--text-muted);
      font-size: 13px;
    }

    /* ── JSON debug panel ── */
    details.json-debug {
      display: none;
    }
    details.json-debug {
      margin: 24px 36px;
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
    }
    details.json-debug summary {
      padding: 10px 16px;
      background: var(--surface2);
      cursor: pointer;
      font-size: 11px;
      color: var(--text-muted);
      user-select: none;
    }
    details.json-debug pre {
      padding: 16px;
      background: var(--surface);
      font-size: 11px;
      overflow-x: auto;
      color: #7cfc80;
      max-height: 300px;
    }

  </style>
</head>
<body>

<header class="page-header">
  <h1>Contenidos de tecnolog&iacute;as digitales</h1>
  <span class="status-pill loading" id="status-pill">Cargando…</span>
</header>

<div class="source-bar">
  <span>Fuente:</span>
  <a href="https://mentor-tecnun.github.io/TD_2025/EstructuraContenido.md" target="_blank">
    mentor-tecnun.github.io/TD_2025/EstructuraContenido.md
  </a>
</div>

<div class="controls-bar">
  <button class="btn-toggle-preview" id="btn-preview" onclick="toggleAllPreviews(this)">
    📺 Mostrar vista previa de videos
  </button>
  <label for="iframeSize">Altura iframe:</label>
  <select id="iframeSize" onchange="updateIframeHeights()">
    <option value="100">100</option>
    <option value="200">200</option>
    <option value="400" selected>400</option>
    <option value="600">600</option>
    <option value="800">800</option>
    <option value="1080">1080</option>
  </select>
</div>

<div id="loading-msg">Cargando contenido desde el repositorio…</div>
<div id="app-content"></div>

<details class="json-debug" id="json-debug" style="display:none">
  <summary>🔍 Ver JSON generado</summary>
  <pre id="json-output"></pre>
</details>

<script>
/* ═══════════════════════════════════════════════
   1. FETCH & PARSE MARKDOWN → JSON
═══════════════════════════════════════════════ */

const MD_URL = 'https://mentor-tecnun.github.io/TD_2025/EstructuraContenido.md';

async function fetchMarkdown(url) {
  const res = await fetch(url);
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  return res.text();
}

/**
 * Parses a Markdown line into an array of token objects.
 * Handles mixed text and [label](url) links.
 * Returns: Array of { type: 'text'|'link', text, url? }
 */
function parseInlineTokens(text) {
  const tokens = [];
  const linkRe = /\[([^\]]+)\]\(([^)]+)\)/g;
  let last = 0, m;
  while ((m = linkRe.exec(text)) !== null) {
    if (m.index > last) tokens.push({ type: 'text', text: text.slice(last, m.index).trim() });
    tokens.push({ type: 'link', text: m[1], url: m[2] });
    last = m.index + m[0].length;
  }
  if (last < text.length) {
    const tail = text.slice(last).trim();
    if (tail) tokens.push({ type: 'text', text: tail });
  }
  return tokens;
}

/**
 * Parses a bullet line (after removing leading "- ").
 * Detects if line starts with "Video" and extracts multiple links.
 * Returns: { isVideo: bool, label?: string, tokens: [...] }
 */
function parseBulletItem(raw) {
  const trimmed = raw.replace(/^-\s*/, '');
  const isVideo = /^Video\b/i.test(trimmed);
  const labelMatch = trimmed.match(/^([A-Za-záéíóúÁÉÍÓÚñÑ\s]+?)\s+(\[.*)$/);
  let label = '';
  let rest = trimmed;
  if (isVideo) {
    rest = trimmed.replace(/^Video\s*/i, '');
    label = 'Video';
  } else if (labelMatch && !/^\[/.test(trimmed)) {
    // starts with plain text before a link
    label = labelMatch[1];
    rest = labelMatch[2];
  }
  const tokens = parseInlineTokens(rest);
  return { isVideo, label, tokens };
}

/**
 * Main parser: Markdown text → JSON structure.
 * Returns: Array of { section: string, topics: [{ topic, contenido, materiales, practicas }] }
 */
function markdownToJSON(md) {
  const lines = md.split('\n');
  const sections = [];
  let currentSection = null;
  let currentTopic = null;
  let currentGroup = null; // 'contenido' | 'materiales' | 'practicas'

  for (let i = 0; i < lines.length; i++) {
    const line = lines[i];
    const trimmed = line.trim();
    if (!trimmed) continue;

    // H1 → new section
    if (/^#\s+/.test(trimmed) && !/^##/.test(trimmed)) {
      currentSection = { section: trimmed.replace(/^#\s+/, ''), topics: [] };
      sections.push(currentSection);
      currentTopic = null;
      currentGroup = null;
      continue;
    }

    // H2 → new topic within section
    if (/^##\s+/.test(trimmed) && !/^###/.test(trimmed)) {
      if (!currentSection) {
        currentSection = { section: '', topics: [] };
        sections.push(currentSection);
      }
      currentTopic = {
        topic: trimmed.replace(/^##\s+/, ''),
        contenido: [],
        materiales: [],
        practicas: []
      };
      currentSection.topics.push(currentTopic);
      currentGroup = null;
      continue;
    }

    // H3 → group identifier
    if (/^###\s+/.test(trimmed)) {
      const groupName = trimmed.replace(/^###\s+/, '').toLowerCase();
      if (groupName.includes('contenido')) currentGroup = 'contenido';
      else if (groupName.includes('material')) currentGroup = 'materiales';
      else if (groupName.includes('práctica') || groupName.includes('practica')) currentGroup = 'practicas';
      else currentGroup = null;
      continue;
    }

    // Bullet item
    if (/^-\s+/.test(trimmed) && currentTopic && currentGroup) {
      const item = parseBulletItem(trimmed);
      currentTopic[currentGroup].push(item);
      continue;
    }
  }

  return sections;
}

/* ═══════════════════════════════════════════════
   2. JSON → HTML TABLE
═══════════════════════════════════════════════ */

let videosVisible = false;

function getIframeHeight() {
  return parseInt(document.getElementById('iframeSize').value) || 400;
}

function renderTokens(tokens, isVideo) {
  let html = '';
  tokens.forEach((t, idx) => {
    if (t.type === 'text') {
      html += `<span>${escHtml(t.text)}</span> `;
    } else {
      // First link in a video item gets the video tag treatment
      if (isVideo && idx === 0) {
        const iframeBlock = videosVisible
          ? `<div class="iframe-container">
               <iframe src="${escHtml(t.url)}" height="${getIframeHeight()}" allowfullscreen loading="lazy"></iframe>
             </div>`
          : `<div class="iframe-container" style="display:none">
               <iframe src="${escHtml(t.url)}" height="${getIframeHeight()}" allowfullscreen loading="lazy"></iframe>
             </div>`;
        html += `<a href="${escHtml(t.url)}" target="_blank">${escHtml(t.text)}</a>${iframeBlock} `;
      } else {
        html += `<a href="${escHtml(t.url)}" target="_blank">${escHtml(t.text)}</a>&nbsp;&nbsp;`;
      }
    }
  });
  return html.trim();
}

function renderMaterialRow(item) {
  const tagHtml = item.isVideo
    ? `<span class="tag tag-video">VIDEO</span>`
    : (item.label ? `<span class="tag tag-doc">${escHtml(item.label)}</span>` : '');
  const content = renderTokens(item.tokens, item.isVideo);
  return `<div class="material-row">${tagHtml} <span>${content}</span></div>`;
}

function renderContenidoItem(item) {
  // contenido items may be plain text or a single link
  const tokens = item.tokens;
  if (!tokens || tokens.length === 0) return '';
  const inner = tokens.map(t =>
    t.type === 'link'
      ? `<a href="${escHtml(t.url)}" target="_blank">${escHtml(t.text)}</a>`
      : escHtml(t.text)
  ).join(' ');
  return `<p class="content-item">${inner}</p>`;
}

function renderPracticaItem(item) {
  const tokens = item.tokens;
  if (!tokens || tokens.length === 0) return '';
  const inner = tokens.map(t =>
    t.type === 'link'
      ? `<a href="${escHtml(t.url)}" target="_blank">${escHtml(t.text)}</a>`
      : escHtml(t.text)
  ).join(' ');
  return `<p class="practice-item">${inner}</p>`;
}

function renderSection(section) {
  let html = `<h2 id="${escHtml(section.section)}" class="section-title">${escHtml(section.section)}</h2>`;
  html += `<table class="topic-table">
    <thead>
      <tr>
        <th>Tema</th>
        <th>Contenido</th>
        <th>Materiales</th>
        <th>Prácticas</th>
      </tr>
    </thead>
    <tbody>`;

  section.topics.forEach(t => {
    const contenidoHTML = t.contenido.map(renderContenidoItem).join('');
    const materialesHTML = t.materiales.map(renderMaterialRow).join('');
    const practicasHTML = t.practicas.map(renderPracticaItem).join('');

    html += `<tr>
      <td id="${escHtml(t.topic)}">${escHtml(t.topic)}</td>
      <td>${contenidoHTML || '<span style="color:var(--text-muted)">—</span>'}</td>
      <td>${materialesHTML || '<span style="color:var(--text-muted)">—</span>'}</td>
      <td>${practicasHTML || '<span style="color:var(--text-muted)">—</span>'}</td>
    </tr>`;
  });

  html += `</tbody></table>`;
  return html;
}

function renderJSON(data) {
  let html = '';
  data.forEach(section => {
    if (section.topics.length > 0) {
      html += renderSection(section);
    }
  });
  return html;
}

/* ═══════════════════════════════════════════════
   3. VIDEO PREVIEW CONTROLS
═══════════════════════════════════════════════ */

function toggleAllPreviews(btn) {
  videosVisible = !videosVisible;
  btn.classList.toggle('active', videosVisible);
  btn.textContent = videosVisible ? '📺 Ocultar vista previa de videos' : '📺 Mostrar vista previa de videos';

  const containers = document.querySelectorAll('.iframe-container');
  containers.forEach(c => {
    c.style.display = videosVisible ? 'block' : 'none';
  });
}

function updateIframeHeights() {
  const h = getIframeHeight();
  document.querySelectorAll('.iframe-container iframe').forEach(f => {
    f.height = h;
  });
}

/* ═══════════════════════════════════════════════
   4. UTILITIES
═══════════════════════════════════════════════ */

function escHtml(str) {
  return (str || '')
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

/* ═══════════════════════════════════════════════
   5. BOOTSTRAP
═══════════════════════════════════════════════ */

async function init() {
  const pill = document.getElementById('status-pill');
  const loadMsg = document.getElementById('loading-msg');

  try {
    const md = await fetchMarkdown(MD_URL);
    const json = markdownToJSON(md);

    // Show JSON debug
    document.getElementById('json-output').textContent = JSON.stringify(json, null, 2);
    document.getElementById('json-debug').style.display = '';

    // Render tables
    const appDiv = document.getElementById('app-content');
    appDiv.innerHTML = `<div class="content">${renderJSON(json)}</div>`;

    loadMsg.style.display = 'none';
    pill.textContent = `${json.reduce((a, s) => a + s.topics.length, 0)} temas`;
    pill.className = 'status-pill';
  } catch (err) {
    loadMsg.textContent = `Error al cargar el contenido: ${err.message}`;
    pill.textContent = 'Error';
    pill.className = 'status-pill error';
    console.error(err);
  }
}

init();
</script>
</body>
</html>
